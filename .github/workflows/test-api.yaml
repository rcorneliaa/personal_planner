name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.3"
        
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-html requests

      - name: Start API server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          docker run -d -p 8000:8000 --name habit-tracker-app habit-tracker
          sleep 10

      - name: Run Tests
        run: |
          pytest TEST/ -v --html=report_api_testing.html --self-contained-html

      - name: Upload test report 
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: report_api_test.html
